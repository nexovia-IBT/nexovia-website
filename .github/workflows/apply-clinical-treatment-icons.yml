name: Use clinical treatment icons

on:
  push:
    paths:
      - ".github/workflows/apply-clinical-treatment-icons.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace treatment icons with most clinical set
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'components/sections/WhyNexoviaSection.tsx';
          let text = fs.readFileSync(path, 'utf8');

          const start = text.indexOf('function TreatmentIcon');
          const end = text.indexOf('\n\nconst fadeUp', start);
          if (start === -1 || end === -1) throw new Error('TreatmentIcon function boundaries not found');

          const newFunction = `function TreatmentIcon({ kind }: { kind: string }) {
  const common = {
    fill: 'none',
    stroke: GOLD,
    strokeWidth: 1.45,
    strokeLinecap: 'round' as const,
    strokeLinejoin: 'round' as const,
  }

  return (
    <svg viewBox="0 0 64 64" aria-hidden="true" style={{ width: 62, height: 62, display: 'block' }}>
      {kind === 'laser' && (
        <g {...common}>
          <path d="M8 44h48" />
          <path d="M36 10 27 41" />
          <path d="M27 41l-8-8" />
          <path d="M27 41l8-7" />
          <path d="M27 41l-3 7" />
          <path d="M27 41l5 6" />
          <circle cx="14" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="19" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="24" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="29" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="34" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="39" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="44" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="49" cy="50" r="0.9" fill={GOLD} stroke="none" />
          <circle cx="18" cy="55" r="0.7" fill={GOLD} stroke="none" opacity="0.75" />
          <circle cx="23" cy="55" r="0.7" fill={GOLD} stroke="none" opacity="0.75" />
          <circle cx="28" cy="55" r="0.7" fill={GOLD} stroke="none" opacity="0.75" />
          <circle cx="33" cy="55" r="0.7" fill={GOLD} stroke="none" opacity="0.75" />
          <circle cx="38" cy="55" r="0.7" fill={GOLD} stroke="none" opacity="0.75" />
          <circle cx="43" cy="55" r="0.7" fill={GOLD} stroke="none" opacity="0.75" />
        </g>
      )}
      {kind === 'needles' && (
        <g {...common}>
          <path d="M14 9v29l-2 5 2 3 2-3-2-5V9" />
          <path d="M22 9v29l-2 5 2 3 2-3-2-5V9" />
          <path d="M30 9v29l-2 5 2 3 2-3-2-5V9" />
          <path d="M38 9v29l-2 5 2 3 2-3-2-5V9" />
          <path d="M46 9v29l-2 5 2 3 2-3-2-5V9" />
          <path d="M54 9v29l-2 5 2 3 2-3-2-5V9" />
          <path d="M9 48c6-1.8 11-1.8 17 0s10 1.8 16 0 9-1.7 13 0" />
          <circle cx="10" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="15" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="20" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="25" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="30" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="35" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="40" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="45" cy="54" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="50" cy="54" r="0.8" fill={GOLD} stroke="none" />
        </g>
      )}
      {kind === 'rf' && (
        <g {...common}>
          <circle cx="32" cy="13" r="6" />
          <path d="M24 23a12 12 0 0 0 16 0" />
          <path d="M18 27a20 20 0 0 0 28 0" />
          <path d="M13 32a27 27 0 0 0 38 0" />
          <path d="M8 37a34 34 0 0 0 48 0" />
        </g>
      )}
      {kind === 'peel' && (
        <g {...common}>
          <path d="M9 14c9-2.4 18-2.4 27 0s13 2.4 19 0" />
          <path d="M9 23c9-2.4 18-2.4 27 0s13 2.4 19 0" />
          <path d="M9 42c9-2.4 18-2.4 27 0s13 2.4 19 0" />
          <path d="M9 51c9-2.4 18-2.4 27 0s13 2.4 19 0" />
          <circle cx="12" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="17" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="22" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="27" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="32" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="37" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="42" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="47" cy="31" r="0.8" fill={GOLD} stroke="none" />
          <circle cx="15" cy="36" r="0.75" fill={GOLD} stroke="none" opacity="0.72" />
          <circle cx="20" cy="36" r="0.75" fill={GOLD} stroke="none" opacity="0.72" />
          <circle cx="25" cy="36" r="0.75" fill={GOLD} stroke="none" opacity="0.72" />
          <circle cx="30" cy="36" r="0.75" fill={GOLD} stroke="none" opacity="0.72" />
          <circle cx="35" cy="36" r="0.75" fill={GOLD} stroke="none" opacity="0.72" />
          <circle cx="40" cy="36" r="0.75" fill={GOLD} stroke="none" opacity="0.72" />
          <circle cx="45" cy="36" r="0.75" fill={GOLD} stroke="none" opacity="0.72" />
        </g>
      )}
    </svg>
  )
}`;

          text = text.slice(0, start) + newFunction + text.slice(end);
          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-clinical-treatment-icons.yml
          git add components/sections/WhyNexoviaSection.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Use clinical treatment icons"
            git push
          fi
