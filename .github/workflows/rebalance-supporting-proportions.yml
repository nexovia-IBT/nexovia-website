name: Rebalance supporting architecture proportions

on:
  push:
    paths:
      - ".github/workflows/rebalance-supporting-proportions.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebalance section proportions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'components/sections/SupportingArchitectureSectionLive.tsx';
          let text = fs.readFileSync(path, 'utf8');

          const replaceAll = (from, to) => { text = text.split(from).join(to); };

          // Reduce left rail visual weight.
          replaceAll("style={{ width: 30, height: 30, borderRadius: '50%'", "style={{ width: 26, height: 26, borderRadius: '50%'");
          replaceAll("style={{ width: 16, height: 16, display: 'block' }}", "style={{ width: 14, height: 14, display: 'block' }}");
          replaceAll("bottom: 'max(48px, 6.5vh)'", "bottom: 'max(52px, 7vh)'");
          replaceAll("left: '5.8vw'", "left: '4.8vw'");
          replaceAll("width: 'min(350px, 29vw)'", "width: 'min(292px, 24vw)'");
          replaceAll("gridTemplateColumns: '30px 28px minmax(0, 1fr)'", "gridTemplateColumns: '26px 22px minmax(0, 1fr)'");
          replaceAll("columnGap: 12", "columnGap: 10");
          replaceAll("paddingBottom: d < slide.details.length - 1 ? 10 : 0", "paddingBottom: d < slide.details.length - 1 ? 8 : 0");
          replaceAll("marginBottom: d < slide.details.length - 1 ? 10 : 0", "marginBottom: d < slide.details.length - 1 ? 8 : 0");
          replaceAll("width: 28, height: 1, backgroundColor: '#EDC967'", "width: 22, height: 1, backgroundColor: '#EDC967'");
          replaceAll("fontSize: 10.5", "fontSize: 9.4");
          replaceAll("lineHeight: 1.25", "lineHeight: 1.22");

          // Nudge center group slightly right to restore spacing between rail and title/illustration.
          replaceAll("left: '50%', top: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? '76%' : '68%'", "left: '52%', top: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? '76%' : '68%'");
          replaceAll("left: '50%', top: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? '50%' : '47%'", "left: '52%', top: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? '50%' : '47%'");

          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/rebalance-supporting-proportions.yml
          git add components/sections/SupportingArchitectureSectionLive.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rebalance supporting architecture proportions"
            git push
          fi
