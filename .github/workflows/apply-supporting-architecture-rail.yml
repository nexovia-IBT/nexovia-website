name: Apply supporting architecture rail proportions

on:
  push:
    paths:
      - ".github/workflows/apply-supporting-architecture-rail.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch rail proportions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'components/sections/SupportingArchitectureSectionLive.tsx';
          let text = fs.readFileSync(path, 'utf8');
          const replacements = [
            [/width: 28,\s*\n\s*height: 28,/, "width: 30,\n        height: 30,"],
            ["style={{ width: 15, height: 15, display: 'block' }}", "style={{ width: 16, height: 16, display: 'block' }}"],
            ["bottom: 'max(54px, 7vh)'", "bottom: 'max(48px, 6.5vh)'"],
            ["left: '6.2vw'", "left: '5.8vw'"],
            ["width: 'min(320px, 27vw)'", "width: 'min(350px, 29vw)'"],
            ["gridTemplateColumns: '28px 26px 1fr'", "gridTemplateColumns: '30px 28px minmax(0, 1fr)'"],
            ["paddingBottom: d < slide.details.length - 1 ? 11 : 0,", "paddingBottom: d < slide.details.length - 1 ? 10 : 0,"],
            ["marginBottom: d < slide.details.length - 1 ? 11 : 0,", "marginBottom: d < slide.details.length - 1 ? 10 : 0,"],
            [/width: 26,\s*\n\s*height: 1,/, "width: 28,\n                        height: 1,"],
            ["fontSize: 10,", "fontSize: 10.5,"],
            ["lineHeight: 1.35,", "lineHeight: 1.25,"],
          ];
          for (const [from, to] of replacements) {
            text = typeof from === 'string' ? text.split(from).join(to) : text.replace(from, to);
          }
          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-supporting-architecture-rail.yml
          git add components/sections/SupportingArchitectureSectionLive.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply shared ingredient rail proportions"
            git push
          fi
