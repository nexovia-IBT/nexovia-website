name: Refine botanical ingredient slide

on:
  push:
    paths:
      - ".github/workflows/refine-botanical-slide.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Refine slide 08 only
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'components/sections/SupportingArchitectureSectionLive.tsx';
          let text = fs.readFileSync(path, 'utf8');

          const oldTitle = "fontSize: 'clamp(48px, 7vw, 110px)', fontWeight: 400, color: '#732C3F', opacity: 0.18, letterSpacing: '-0.02em', lineHeight: 1, margin: 0, whiteSpace: 'nowrap'";
          const newTitle = "fontSize: slide.illustration === 'botanical' ? 'clamp(42px, 6vw, 88px)' : 'clamp(48px, 7vw, 110px)', fontWeight: 400, color: '#732C3F', opacity: slide.illustration === 'botanical' ? 0.16 : 0.18, letterSpacing: '-0.02em', lineHeight: 1, margin: 0, whiteSpace: 'nowrap'";
          if (!text.includes(newTitle)) {
            if (!text.includes(oldTitle)) throw new Error('Title style block not found');
            text = text.replace(oldTitle, newTitle);
          }

          const oldDesc = "<div style={{ position: 'absolute', top: '17%', right: '9vw', width: 'min(285px, 24vw)', zIndex: 4, textAlign: 'right' }}><p style={{ fontSize: 11";
          const newDesc = "<div style={{ position: 'absolute', top: slide.illustration === 'botanical' ? '16%' : '17%', right: slide.illustration === 'botanical' ? '7.6vw' : '9vw', width: slide.illustration === 'botanical' ? 'min(340px, 28vw)' : 'min(285px, 24vw)', zIndex: 4, textAlign: 'right' }}><p style={{ fontSize: 11";
          if (!text.includes(newDesc)) {
            if (!text.includes(oldDesc)) throw new Error('Description style block not found');
            text = text.replace(oldDesc, newDesc);
          }

          const oldIllustration = "width: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? 'min(390px, 42vw)' : 'min(280px, 30vw)', height: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? 'min(390px, 54vh)' : 'min(280px, 42vh)'";
          const newIllustration = "width: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? 'min(390px, 42vw)' : slide.illustration === 'botanical' ? 'min(260px, 28vw)' : 'min(280px, 30vw)', height: slide.illustration === 'adenosine' || slide.illustration === 'allantoin' ? 'min(390px, 54vh)' : slide.illustration === 'botanical' ? 'min(260px, 39vh)' : 'min(280px, 42vh)'";
          if (!text.includes(newIllustration)) {
            if (!text.includes(oldIllustration)) throw new Error('Illustration style block not found');
            text = text.replace(oldIllustration, newIllustration);
          }

          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/refine-botanical-slide.yml
          git add components/sections/SupportingArchitectureSectionLive.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Refine botanical ingredient slide"
            git push
          fi
