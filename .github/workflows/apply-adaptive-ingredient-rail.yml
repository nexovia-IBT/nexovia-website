name: Apply adaptive ingredient rail layout

on:
  push:
    paths:
      - ".github/workflows/apply-adaptive-ingredient-rail.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch adaptive rail renderer
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'components/sections/SupportingArchitectureSectionLive.tsx';
          let text = fs.readFileSync(path, 'utf8');

          if (!text.includes('function getDetailRailConfig')) {
            text = text.replace(
              "function DetailIcon({ detail, index }: { detail: string; index: number }) {",
              "function getDetailRailConfig(slide: typeof SLIDES[number]) {\n  const longest = Math.max(...slide.details.map((detail) => detail.length))\n  if (longest >= 30) return { width: 'min(390px, 31vw)', rowHeight: 43, fontSize: 9.2, connector: 24, icon: 28 }\n  if (longest >= 24) return { width: 'min(365px, 29vw)', rowHeight: 42, fontSize: 9.6, connector: 25, icon: 28 }\n  if (longest >= 21) return { width: 'min(345px, 28vw)', rowHeight: 41, fontSize: 10, connector: 26, icon: 28 }\n  return { width: 'min(320px, 27vw)', rowHeight: 40, fontSize: 10.5, connector: 28, icon: 30 }\n}\n\nfunction DetailIcon({ detail, index }: { detail: string; index: number }) {"
            );
          }

          text = text.replace(
            "function getDetailLabel(detail: string) {\n  return detail.replace(/\\s*\\([^)]*\\)/g, '')\n}\n\n",
            ""
          );

          const oldRail = "<div style={{ position: 'absolute', bottom: 'max(54px, 7vh)', left: '6.2vw', zIndex: 4, width: 'min(320px, 27vw)' }}>{slide.details.map((detail, d) => <div key={detail} style={{ display: 'grid', gridTemplateColumns: '28px 26px minmax(0, 1fr)', alignItems: 'center', columnGap: 12, height: 40, borderBottom: d < slide.details.length - 1 ? '1px solid rgba(115,44,63,0.1)' : undefined }}><DetailIcon detail={detail} index={d} /><div style={{ width: 26, height: 1, backgroundColor: '#EDC967' }} /><span title={detail} style={{ display: 'block', minWidth: 0, fontSize: 10, color: '#732C3F', opacity: 0.9, letterSpacing: '0.1em', lineHeight: 1.35, fontWeight: 700, textTransform: 'uppercase', fontFamily: SANS, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{getDetailLabel(detail)}</span></div>)}</div>";
          const newRail = "{(() => { const rail = getDetailRailConfig(slide); return <div style={{ position: 'absolute', bottom: 'max(54px, 7vh)', left: '6.2vw', zIndex: 4, width: rail.width }}>{slide.details.map((detail, d) => <div key={detail} style={{ display: 'grid', gridTemplateColumns: `${rail.icon}px ${rail.connector}px minmax(0, 1fr)`, alignItems: 'center', columnGap: 12, minHeight: rail.rowHeight, paddingBottom: d < slide.details.length - 1 ? 8 : 0, marginBottom: d < slide.details.length - 1 ? 8 : 0, borderBottom: d < slide.details.length - 1 ? '1px solid rgba(115,44,63,0.1)' : undefined }}><DetailIcon detail={detail} index={d} /><div style={{ width: rail.connector, height: 1, backgroundColor: '#EDC967' }} /><span style={{ display: 'block', minWidth: 0, fontSize: rail.fontSize, color: '#732C3F', opacity: 0.9, letterSpacing: '0.1em', lineHeight: 1.25, fontWeight: 700, textTransform: 'uppercase', fontFamily: SANS }}>{detail}</span></div>)}</div> })()}";
          if (!text.includes(oldRail)) throw new Error('Expected rail block not found');
          text = text.replace(oldRail, newRail);

          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-adaptive-ingredient-rail.yml
          git add components/sections/SupportingArchitectureSectionLive.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply adaptive ingredient rail layout"
            git push
          fi
