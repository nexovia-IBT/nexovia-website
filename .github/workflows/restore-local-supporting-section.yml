name: Restore local supporting architecture layout

on:
  push:
    paths:
      - ".github/workflows/restore-local-supporting-section.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore local section proportions
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'components/sections/SupportingArchitectureSectionLive.tsx';
          let text = fs.readFileSync(path, 'utf8');

          // Remove the deployed adaptive helper. Local does not use this.
          text = text.replace(/\nfunction getDetailRailConfig\(slide: typeof SLIDES\[number\]\) \{[\s\S]*?\n\}\n\nfunction DetailIcon/, '\nfunction DetailIcon');

          // Restore local icon sizing.
          text = text.replace("style={{ width: 28, height: 28, borderRadius: '50%'", "style={{ width: 30, height: 30, borderRadius: '50%'");
          text = text.replace("style={{ width: 15, height: 15, display: 'block' }}", "style={{ width: 16, height: 16, display: 'block' }}");

          // Restore local title letter spacing.
          text = text.replace("opacity: 0.18, letterSpacing: 0, lineHeight: 1", "opacity: 0.18, letterSpacing: '-0.02em', lineHeight: 1");

          // Restore the local fixed rail block exactly in behavior.
          const adaptiveRail = /\{\(\(\) => \{ const rail = getDetailRailConfig\(slide\); return <div style=\{\{ position: 'absolute', bottom: 'max\(54px, 7vh\)', left: '6\.2vw', zIndex: 4, width: rail\.width \}\}>\{slide\.details\.map\(\(detail, d\) => <div key=\{detail\} style=\{\{ display: 'grid', gridTemplateColumns: `\$\{rail\.icon\}px \$\{rail\.connector\}px minmax\(0, 1fr\)`, alignItems: 'center', columnGap: 12, minHeight: rail\.rowHeight, paddingBottom: d < slide\.details\.length - 1 \? 8 : 0, marginBottom: d < slide\.details\.length - 1 \? 8 : 0, borderBottom: d < slide\.details\.length - 1 \? '1px solid rgba\(115,44,63,0\.1\)' : undefined \}\}><DetailIcon detail=\{detail\} index=\{d\} \/><div style=\{\{ width: rail\.connector, height: 1, backgroundColor: '#EDC967' \}\} \/><span style=\{\{ display: 'block', minWidth: 0, fontSize: rail\.fontSize, color: '#732C3F', opacity: 0\.9, letterSpacing: '0\.1em', lineHeight: 1\.25, fontWeight: 700, textTransform: 'uppercase', fontFamily: SANS \}\}>\{detail\}<\/span><\/div>\)\}<\/div> \}\)\(\)\}/;
          const localRail = "<div style={{ position: 'absolute', bottom: 'max(48px, 6.5vh)', left: '5.8vw', zIndex: 4, width: 'min(350px, 29vw)' }}>{slide.details.map((detail, d) => <div key={detail} style={{ display: 'grid', gridTemplateColumns: '30px 28px minmax(0, 1fr)', alignItems: 'center', columnGap: 12, paddingBottom: d < slide.details.length - 1 ? 10 : 0, marginBottom: d < slide.details.length - 1 ? 10 : 0, borderBottom: d < slide.details.length - 1 ? '1px solid rgba(115,44,63,0.1)' : undefined }}><DetailIcon detail={detail} index={d} /><div style={{ width: 28, height: 1, backgroundColor: '#EDC967' }} /><span style={{ fontSize: 10.5, color: '#732C3F', opacity: 0.9, letterSpacing: '0.1em', lineHeight: 1.25, fontWeight: 700, textTransform: 'uppercase', fontFamily: SANS }}>{detail}</span></div>)}</div>";
          if (!adaptiveRail.test(text)) {
            throw new Error('Adaptive rail block was not found; refusing to guess.');
          }
          text = text.replace(adaptiveRail, localRail);

          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/restore-local-supporting-section.yml
          git add components/sections/SupportingArchitectureSectionLive.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Restore local supporting architecture layout"
            git push
          fi
