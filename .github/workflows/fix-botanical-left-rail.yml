name: Fix botanical left rail proportions

on:
  push:
    paths:
      - ".github/workflows/fix-botanical-left-rail.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fix slide 08 rail only
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'components/sections/SupportingArchitectureSectionLive.tsx';
          let text = fs.readFileSync(path, 'utf8');

          const oldRail = "<div style={{ position: 'absolute', bottom: 'max(52px, 7vh)', left: '4.8vw', zIndex: 4, width: 'min(292px, 24vw)' }}>{slide.details.map((detail, d) => <div key={detail} style={{ display: 'grid', gridTemplateColumns: '26px 22px minmax(0, 1fr)', alignItems: 'center', columnGap: 10, paddingBottom: d < slide.details.length - 1 ? 8 : 0, marginBottom: d < slide.details.length - 1 ? 8 : 0, borderBottom: d < slide.details.length - 1 ? '1px solid rgba(115,44,63,0.1)' : undefined }}><DetailIcon detail={detail} index={d} /><div style={{ width: 22, height: 1, backgroundColor: '#EDC967' }} /><span style={{ fontSize: 9.4, color: '#732C3F', opacity: 0.9, letterSpacing: '0.1em', lineHeight: 1.22, fontWeight: 700, textTransform: 'uppercase', fontFamily: SANS }}>{detail}</span></div>)}</div>";

          const newRail = "<div style={{ position: 'absolute', bottom: 'max(52px, 7vh)', left: slide.illustration === 'botanical' ? '4.2vw' : '4.8vw', zIndex: 4, width: slide.illustration === 'botanical' ? 'min(238px, 19vw)' : 'min(292px, 24vw)' }}>{slide.details.map((detail, d) => { const isBotanical = slide.illustration === 'botanical'; return <div key={detail} style={{ display: 'grid', gridTemplateColumns: isBotanical ? '24px 16px minmax(0, 1fr)' : '26px 22px minmax(0, 1fr)', alignItems: 'center', columnGap: isBotanical ? 8 : 10, paddingBottom: d < slide.details.length - 1 ? 8 : 0, marginBottom: d < slide.details.length - 1 ? 8 : 0, borderBottom: d < slide.details.length - 1 ? '1px solid rgba(115,44,63,0.1)' : undefined }}><DetailIcon detail={detail} index={d} /><div style={{ width: isBotanical ? 16 : 22, height: 1, backgroundColor: '#EDC967' }} /><span style={{ fontSize: isBotanical ? 8.7 : 9.4, color: '#732C3F', opacity: 0.9, letterSpacing: '0.1em', lineHeight: 1.22, fontWeight: 700, textTransform: 'uppercase', fontFamily: SANS }}>{detail}</span></div> })}</div>";

          if (!text.includes(oldRail) && !text.includes(newRail)) {
            throw new Error('Expected current rail block not found');
          }
          if (!text.includes(newRail)) text = text.replace(oldRail, newRail);

          fs.writeFileSync(path, text);
          NODE
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-botanical-left-rail.yml
          git add components/sections/SupportingArchitectureSectionLive.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix botanical left rail proportions"
            git push
          fi
